<!DOCTYPE html>
<html>
<head>
    <title>Bee | Necklaces</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(180deg, #ffffff, #fff7e6);
            color: #2f2419;
        }

        header {
            text-align: center;
            padding: 30px;
            font-size: 32px;
            font-weight: 600;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .intro {
            text-align: center;
            color: #6f5a42;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .product {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(214,168,74,0.12);
            text-align: center;
        }

        .product img {
            width: 250px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 16px;
            background: #c9a24a;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<header>Necklaces</header>

<div class="container">

    <div class="intro">
        Discover elegant necklaces carefully selected to elevate your everyday style.
    </div>

    <!-- PRODUCT SECTION -->
    <div class="product">

        <h2>Gold Heart Necklace</h2>

        <!-- Replace this image -->
        <img src="https://pin.it/1lVV9RlEx">

        <p>
            A timeless gold heart necklace designed for elegance and everyday wear.
            Perfect as a gift or personal style upgrade.
        </p>

        <!-- Replace this with your Amazon affiliate link -->
        <a class="btn" href="https://amzn.to/4cjosYG" target="_blank">
            Buy Now on Amazon
        </a>

    </div>

</div>

</body>
</html>
