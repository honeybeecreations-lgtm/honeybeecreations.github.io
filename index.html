<!DOCTYPE html>
<html>
<head>
    <title>Bee | Curated Finds</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(180deg, #ffffff, #fff7e6);
            color: #2f2419;
        }

        header {
            text-align: center;
            padding: 30px;
            font-size: 34px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .bee-icon {

            height: 32px;
        }

        .tagline {

            color: #7a6245;
            margin-bottom: 30px;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            width: 200px;
            margin: 12px;
            padding: 18px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(214,168,74,0.12),
                        0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
            transition: 0.3s;
            border: 1px solid rgba(214,168,74,0.12);
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 14px;
            background: #c9a24a;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<header>
    <img class="bee-icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Bee_icon.svg/512px-Bee_icon.svg.png" alt="bee">

<div class="grid">

    <div class="card">

        <p>Elegant bee-inspired pieces</p>
        <a class="btn" href="jewelry.html">View</a>

    <div class="card">
        <h3>Clothes</h3>
        <p>Soft warm aesthetic fashion</p>
        <a class="btn" href="clothes.html">View</a>
    </div>

    <div class="card">
